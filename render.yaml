# Render Blueprint for Student Management System
# This file configures automatic deployment on Render
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: student-management-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/students
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Auto-generate secure secret
      - key: FRONTEND_URL
        fromService:
          name: student-management-app
          type: static
          property: url

  # Frontend Static Site
  - type: static
    name: student-management-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: student-management-api
          type: web
          property: url
      - key: VITE_SOCKET_URL
        fromService:
          name: student-management-api
          type: web
          property: url
